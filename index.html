<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Đăng nhập · OLM</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="https://rs.olm.vn/images/icon.png">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="card-header">
                <div class="logo-area">
                    <img src="https://rs.olm.vn/v2/login/logo.png" alt="OLM" class="logo">
                </div>
                <h1 class="title">Đăng nhập</h1>
                <p class="subtitle">Tiếp tục hành trình học tập cùng OLM</p>
            </div>

            <form id="loginForm" class="auth-form">
                <!-- CSRF токен (динамически получаем из мета-тега, но можно вставить статический из дамп-лога) -->
                <input type="hidden" name="_token" id="csrfToken" value="C4PVZWxAhOWp8D3DaLlYGsHXoovkMjzQODFhVD1C">
                
                <div class="input-group">
                    <div class="input-icon">
                        <img src="https://rs.olm.vn/icon/outline/user.svg" alt="user">
                    </div>
                    <input type="text" id="username" name="username" placeholder="Tên đăng nhập hoặc Email" autocomplete="username" required>
                </div>

                <div class="input-group">
                    <div class="input-icon">
                        <img src="https://rs.olm.vn/icon/outline/lock.svg" alt="lock">
                    </div>
                    <input type="password" id="password" name="password" placeholder="Mật khẩu" autocomplete="current-password" required>
                    <button type="button" class="toggle-password" aria-label="Hiển thị mật khẩu">
                        <img src="https://rs.olm.vn/icon/outline/eye.svg" alt="eye" class="eye-icon">
                    </button>
                </div>

                <div class="options-row">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember" id="remember">
                        <span class="checkmark"></span>
                        <span class="label-text">Ghi nhớ đăng nhập</span>
                    </label>
                    <button type="button" id="forgotBtn" class="link-button">Quên mật khẩu</button>
                </div>

                <button type="submit" class="submit-btn" id="loginBtn">Đăng nhập</button>

                <div class="divider">
                    <span class="line"></span>
                    <span class="or-text">hoặc</span>
                    <span class="line"></span>
                </div>

                <div class="social-buttons">
                    <a href="https://olm.vn/social/google/redirect" class="social-btn google">
                        <img src="https://rs.olm.vn/icon/icon-google.svg" alt="Google">
                        <span>Tiếp tục bằng Google</span>
                    </a>
                    <a href="https://olm.vn/social/hanoi/redirect" class="social-btn hanoi">
                        <img src="https://rs.olm.vn/icon/logo-hanoi.png" alt="Hanoi">
                        <span>Đăng nhập bằng CSDL GDĐT</span>
                    </a>
                </div>

                <div class="register-link">
                    <span class="text-muted">Bạn chưa có tài khoản?</span>
                    <a href="https://olm.vn/dang-ky" class="accent-link">Đăng ký ngay</a>
                </div>
            </form>
            <div id="errorMessage" class="error-banner" style="display: none; margin-top: 1rem; text-align: center; color: #dc2626; font-size: 0.85rem;"></div>
        </div>
        <div class="auth-illustration">
            <img src="https://rs.olm.vn/v2/login/logo.png" alt="Illustration">
        </div>
    </div>

    <div id="forgotModal" class="modal-overlay" style="display: none;">
        <div class="modal-container">
            <div class="modal-header">
                <h3>Quên mật khẩu</h3>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <p>Nhập email đã đăng ký để nhận hướng dẫn khôi phục.</p>
                <input type="email" id="resetEmail" placeholder="Email của bạn" class="modal-input">
            </div>
            <div class="modal-footer">
                <button class="modal-cancel">Huỷ bỏ</button>
                <button class="modal-submit" id="sendResetBtn">Gửi yêu cầu</button>
            </div>
        </div>
    </div>

    <script>
        // Исправление ошибки 405: отправка через fetch на правильный endpoint
        (function() {
            const loginForm = document.getElementById('loginForm');
            const errorDiv = document.getElementById('errorMessage');
            const loginBtn = document.getElementById('loginBtn');

            // Toggle password visibility
            document.querySelectorAll('.toggle-password').forEach(btn => {
                btn.addEventListener('click', function() {
                    const input = this.closest('.input-group').querySelector('input');
                    if (input.type === 'password') {
                        input.type = 'text';
                        this.querySelector('.eye-icon').src = 'https://rs.olm.vn/icon/outline/eye-off.svg';
                    } else {
                        input.type = 'password';
                        this.querySelector('.eye-icon').src = 'https://rs.olm.vn/icon/outline/eye.svg';
                    }
                });
            });

            // Обработка отправки формы
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorDiv.style.display = 'none';
                loginBtn.disabled = true;
                loginBtn.textContent = 'Đang xử lý...';

                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;
                const remember = document.getElementById('remember').checked ? 1 : 0;
                const csrfToken = document.getElementById('csrfToken').value;

                const formData = new URLSearchParams();
                formData.append('_token', csrfToken);
                formData.append('username', username);
                formData.append('password', password);
                formData.append('remember', remember);

                try {
                    const response = await fetch('https://olm.vn/dangnhap', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                            'X-Requested-With': 'XMLHttpRequest',
                            'Origin': window.location.origin,
                            'Referer': window.location.href
                        },
                        body: formData.toString(),
                        credentials: 'include'  // Важно для сессионных куки
                    });

                    if (response.redirected) {
                        // Успешный логин -> редирект на страницу после входа
                        window.location.href = response.url;
                        return;
                    }

                    const text = await response.text();
                    if (response.status === 200 && text.includes('dashboard')) {
                        window.location.href = 'https://olm.vn';
                    } else if (response.status === 422 || text.includes('tài khoản') || text.includes('mật khẩu')) {
                        errorDiv.textContent = 'Sai tên đăng nhập hoặc mật khẩu. Vui lòng thử lại.';
                        errorDiv.style.display = 'block';
                    } else if (response.status === 405) {
                        errorDiv.textContent = 'Lỗi 405: Phương thức không được hỗ trợ. Thử tải lại trang.';
                        errorDiv.style.display = 'block';
                    } else {
                        errorDiv.textContent = `Lỗi ${response.status}: Không thể đăng nhập. Kiểm tra kết nối.`;
                        errorDiv.style.display = 'block';
                    }
                } catch (err) {
                    console.error(err);
                    errorDiv.textContent = 'Lỗi mạng hoặc CORS. Thử dùng trình duyệt khác hoặc tải lại.';
                    errorDiv.style.display = 'block';
                } finally {
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Đăng nhập';
                }
            });

            // Модалка забыли пароль (без изменения action, просто уведомление)
            const forgotBtn = document.getElementById('forgotBtn');
            const modal = document.getElementById('forgotModal');
            const closeModal = document.querySelector('.close-modal');
            const modalCancel = document.querySelector('.modal-cancel');
            const sendResetBtn = document.getElementById('sendResetBtn');

            function showModal() { modal.style.display = 'flex'; }
            function hideModal() { modal.style.display = 'none'; }

            if (forgotBtn) forgotBtn.addEventListener('click', showModal);
            if (closeModal) closeModal.addEventListener('click', hideModal);
            if (modalCancel) modalCancel.addEventListener('click', hideModal);
            window.addEventListener('click', (e) => { if (e.target === modal) hideModal(); });

            if (sendResetBtn) {
                sendResetBtn.addEventListener('click', async () => {
                    const email = document.getElementById('resetEmail').value;
                    if (!email) {
                        alert('Vui lòng nhập email');
                        return;
                    }
                    const csrfToken = document.getElementById('csrfToken').value;
                    const resp = await fetch('https://olm.vn/send-forget-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: `_token=${encodeURIComponent(csrfToken)}&email=${encodeURIComponent(email)}`,
                        credentials: 'include'
                    });
                    if (resp.ok) {
                        alert('Yêu cầu khôi phục đã được gửi. Kiểm tra email.');
                        hideModal();
                    } else {
                        alert('Gửi yêu cầu thất bại. Thử lại sau.');
                    }
                });
            }
        })();
    </script>
</body>
</html>
