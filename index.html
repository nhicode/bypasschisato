<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Bypass Plato Relay</title>
</head>
<body>
    <h1>Декодер ссылок Plato Relay</h1>
    <p>Вставьте полную ссылку с параметром d:</p>
    <input type="text" id="urlInput" placeholder="https://auth.platorelay.com/a?d=..." style="width: 100%;">
    <button onclick="decodeLink()">Декодировать</button>
    <div id="result"></div>

    <script>
        // Функция извлечения значения параметра d из URL
        function getDParam(url) {
            // Создаем объект URL для парсинга
            var urlObj = new URL(url);
            // Получаем значение параметра d
            return urlObj.searchParams.get('d');
        }

        // Функция декодирования base64 с поддержкой URL-безопасного формата
        function base64Decode(str) {
            // Заменяем URL-безопасные символы на стандартные
            str = str.replace(/-/g, '+').replace(/_/g, '/');
            // Добавляем padding, если необходимо
            while (str.length % 4) {
                str += '=';
            }
            // Декодируем из base64 в строку
            return atob(str);
        }

        // Основная функция обработки
        function decodeLink() {
            var input = document.getElementById('urlInput').value.trim();
            var resultDiv = document.getElementById('result');
            if (!input) {
                resultDiv.innerHTML = 'Ошибка: введите URL.';
                return;
            }
            try {
                var d = getDParam(input);
                if (!d) {
                    resultDiv.innerHTML = 'Ошибка: параметр d не найден в URL.';
                    return;
                }
                var decoded = base64Decode(d);
                // Выводим результат – это исходная ссылка или ключ
                resultDiv.innerHTML = '<strong>Результат:</strong> ' + decoded;
            } catch (e) {
                resultDiv.innerHTML = 'Ошибка декодирования: ' + e.message;
            }
        }
    </script>
</body>
</html>
