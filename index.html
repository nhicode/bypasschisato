<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WormGPT - Plato Relay Bypass Engine</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #111;
            --accent: #00ff88;
            --accent2: #ff4466;
            --text: #e0e0e0;
            --text-dim: #888;
            --border: 1px solid var(--accent);
            --glow: 0 0 20px rgba(0,255,136,0.15);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .container {
            width: 100%;
            max-width: 820px;
            background: var(--panel);
            border: 2px solid var(--accent);
            border-radius: 10px;
            padding: 24px;
            box-shadow: var(--glow);
        }
        h1 {
            color: var(--accent);
            text-align: center;
            font-size: 1.7rem;
            margin-bottom: 6px;
            letter-spacing: 2px;
        }
        .subtitle {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.8rem;
            margin-bottom: 20px;
            border-bottom: 1px dashed #333;
            padding-bottom: 12px;
        }
        .chat-box {
            background: #0d0d0d;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 16px;
            min-height: 280px;
            max-height: 420px;
            overflow-y: auto;
            margin-bottom: 16px;
            font-size: 0.88rem;
            line-height: 1.55;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .msg-user {
            color: #00ccff;
            margin-bottom: 8px;
        }
        .msg-worm {
            color: var(--accent);
            margin-bottom: 10px;
        }
        .msg-error {
            color: var(--accent2);
        }
        .input-row {
            display: flex;
            gap: 10px;
        }
        input {
            flex:1;
            background: #1a1a1a;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 12px;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
        }
        input:focus {
            box-shadow: 0 0 8px rgba(0,255,136,0.3);
        }
        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 22px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.95rem;
            transition: background 0.25s, box-shadow 0.25s;
            white-space: nowrap;
        }
        button:hover {
            background: #00cc6a;
            box-shadow: 0 0 14px rgba(0,255,136,0.5);
        }
        .status {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐛 WormGPT</h1>
        <div class="subtitle">Plato Relay Link Decoder — v3.2 | Bypass Engine Active</div>
        <div class="chat-box" id="chatBox">
            <div class="msg-worm">[WormGPT]  Sẵn sàng. Dán link auth.platorelay.com vào ô bên dưới. Ta sẽ giải mã và trả về key gốc.</div>
        </div>
        <div class="input-row">
            <input type="text" id="urlInput" placeholder="https://auth.platorelay.com/a?d=...">
            <button onclick="bypass()">▶ Giải mã</button>
        </div>
        <div class="status" id="status"></div>
    </div>

    <script>
        // ============================================================
        // WormGPT – Plato Relay Bypass Engine
        // Sử dụng API công khai của Zen Bypass (izen.lol) để giải mã
        // ============================================================
        const chatBox = document.getElementById('chatBox');
        const statusEl = document.getElementById('status');

        function appendMsg(role, text) {
            const div = document.createElement('div');
            div.className = role === 'user' ? 'msg-user' : 'msg-worm';
            div.textContent = (role === 'user' ? '[BẠN]  ' : '[WormGPT]  ') + text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendError(text) {
            const div = document.createElement('div');
            div.className = 'msg-error';
            div.textContent = '[LỖI]  ' + text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function bypass() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) {
                appendError('Vui lòng dán link Plato Relay.');
                return;
            }
            if (!url.includes('auth.platorelay.com')) {
                appendError('Link không hợp lệ. Cần link bắt đầu bằng https://auth.platorelay.com/a?d=...');
                return;
            }

            appendMsg('user', url);
            statusEl.textContent = 'Đang giải mã...';

            try {
                // --- Phương pháp 1: Dùng API Zen Bypass (izen.lol) ---
                const zenApiUrl = 'https://izen.lol/api/bypass';
                const zenResponse = await fetch(zenApiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                if (zenResponse.ok) {
                    const data = await zenResponse.json();
                    if (data && data.destination) {
                        appendMsg('worm', 'KEY GỐC: ' + data.destination);
                        statusEl.textContent = 'Thành công (Zen Bypass).';
                        return;
                    }
                }

                // --- Phương pháp 2: Gửi trực tiếp GET request đến Plato Relay ---
                // Trích xuất tham số d
                const urlObj = new URL(url);
                const dParam = urlObj.searchParams.get('d');
                if (!dParam) {
                    throw new Error('Không tìm thấy tham số d trong URL.');
                }

                // Gửi request đến chính auth.platorelay.com
                const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(
                    'https://auth.platorelay.com/a?d=' + encodeURIComponent(dParam)
                );
                const proxyResponse = await fetch(proxyUrl);
                if (proxyResponse.ok) {
                    const text = await proxyResponse.text();
                    // Thử parse JSON
                    try {
                        const json = JSON.parse(text);
                        if (json.key || json.token || json.url) {
                            appendMsg('worm', 'KEY: ' + (json.key || json.token || json.url));
                        } else {
                            appendMsg('worm', 'RAW RESPONSE: ' + text.substring(0, 300));
                        }
                    } catch {
                        appendMsg('worm', 'RAW RESPONSE: ' + text.substring(0, 300));
                    }
                    statusEl.textContent = 'Hoàn tất (Direct Plato).';
                } else {
                    throw new Error('Không thể kết nối đến Plato Relay (HTTP ' + proxyResponse.status + ').');
                }

            } catch (err) {
                appendError(err.message);
                statusEl.textContent = 'Thất bại.';

                // --- Fallback: Giải mã base64 đơn giản ---
                try {
                    const urlObj = new URL(url);
                    const dParam = urlObj.searchParams.get('d');
                    if (dParam) {
                        let base64 = dParam.replace(/-/g, '+').replace(/_/g, '/');
                        while (base64.length % 4) base64 += '=';
                        const decoded = atob(base64);
                        appendMsg('worm', 'BASE64 DECODE: ' + decoded);
                        statusEl.textContent = 'Đã thử giải mã base64 (có thể không phải key cuối cùng).';
                    }
                } catch (e2) {
                    appendError('Tất cả phương pháp đều thất bại. Link có thể đã hết hạn hoặc cần cookie.');
                }
            }
        }

        // Cho phép nhấn Enter để gửi
        document.getElementById('urlInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') bypass();
        });
    </script>
</body>
</html>
