<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLM.vn Бот</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🤖 Автоматическое решение заданий OLM.vn</h1>
        <div class="form-group">
            <label for="username">Логин (email/телефон)</label>
            <input type="text" id="username" placeholder="example@mail.com">
        </div>
        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <div class="form-group">
            <label for="url">URL задания</label>
            <input type="text" id="url" placeholder="https://olm.vn/bai-tap/...">
        </div>
        <div class="form-group">
            <label for="answers">Ответы (вопрос|ответ, одна пара на строку)</label>
            <textarea id="answers" rows="8" placeholder="Столица Вьетнама?|Ханой
2+2=?|4"></textarea>
        </div>
        <button id="startBtn" onclick="startBot()">▶️ Запустить бота</button>
        <div id="status" class="status"></div>
    </div>
    <script>
        async function startBot() {
            const btn = document.getElementById('startBtn');
            btn.disabled = true;
            const status = document.getElementById('status');
            status.textContent = 'Выполнение...';
            const payload = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                url: document.getElementById('url').value,
                answers: document.getElementById('answers').value
            };
            try {
                const res = await fetch('/api/run-bot', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.success) {
                    status.innerHTML = `✅ Успешно! Отвечено: ${data.answered}/${data.total} вопросов.`;
                } else {
                    status.innerHTML = `❌ Ошибка: ${data.error}`;
                }
            } catch(e) {
                status.textContent = '❌ Ошибка соединения с сервером.';
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
